<header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center gap-4 flex-shrink-0">
  <!-- Botão hamburguer (mobile) -->
  <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg text-gray-500 hover:bg-gray-100">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
  </button>

  <!-- Título da página -->
  <h1 class="text-base font-semibold text-gray-900 flex-1">
    {% block page_title %}{% endblock %}
  </h1>

  <!-- Ações do header -->
  {% block header_actions %}{% endblock %}
</header>
