<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esqueci Minha Senha — SGTI</title>
  <link rel="stylesheet" href="/static/dist/output.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center mx-auto mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 11c0-1.657 1.343-3 3-3s3 1.343 3 3v1h1a1 1 0 011 1v5a1 1 0 01-1 1H5a1 1 0 01-1-1v-5a1 1 0 011-1h1v-1a6 6 0 1112 0"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Recuperar acesso</h1>
      <p class="text-gray-500 text-sm mt-1">Informe o e-mail do usuário para receber o link de redefinição.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      {% include "partials/flash_messages.html" %}

      <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="form-label" for="{{ form.email.id_for_label }}">{{ form.email.label }}</label>
          {{ form.email }}
          {% if form.email.errors %}
          <p class="mt-1 text-xs text-red-600">{{ form.email.errors.0 }}</p>
          {% endif %}
        </div>
        <button type="submit" class="btn-primary w-full justify-center py-2.5">
          Enviar redefinição
        </button>
      </form>

      <div class="mt-4 text-center">
        <a href="{% url 'accounts:login' %}" class="text-sm text-blue-600 hover:text-blue-700 font-medium">
          Voltar para o login
        </a>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('submit', function (e) {
      const btn = e.target.querySelector('[type="submit"]');
      if (!btn) return;
      btn.disabled = true;
      btn.dataset.originalText = btn.innerHTML;
      btn.innerHTML = '<svg class="animate-spin w-4 h-4 mr-2 inline" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>Enviando...';
    });
  </script>
</body>
</html>
