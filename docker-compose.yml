
# ─────────────────────────────────────────────────────────────────
#  Gestão OS TI  –  stack local
#
#  Serviços:
#    backend   – Django API  (porta 8000, rode localmente)
#    frontend  – Next.js     (porta 3000, rode localmente)

# ─────────────────────────────────────────────────────────────────

version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-BOT}
      WHATSAPP_API_URL: ${WHATSAPP_API_URL:-http://bot:3333}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY:-}
      WHATSAPP_SESSION: ${WHATSAPP_SESSION:-default}
      WHATSAPP_WEBHOOK_SECRET: ${WHATSAPP_WEBHOOK_SECRET:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_FALLBACK_MODEL: ${GEMINI_FALLBACK_MODEL:-}
      GEMINI_TIMEOUT_SECONDS: ${GEMINI_TIMEOUT_SECONDS:-15}
      GEMINI_MAX_RETRIES: ${GEMINI_MAX_RETRIES:-2}
      GEMINI_RETRY_BASE_SECONDS: ${GEMINI_RETRY_BASE_SECONDS:-1.5}
      WHATSAPP_CONVERSATION_TIMEOUT_MINUTES: ${WHATSAPP_CONVERSATION_TIMEOUT_MINUTES:-30}
    volumes:
      - ./backend:/app
    networks:
      - app_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: https://instead-greeting-oklahoma-booking.trycloudflare.com
    networks:
      - app_net
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: bot
    restart: unless-stopped
    environment:
      PORT: 3333
      BACKEND_WEBHOOK_URL: ${BACKEND_WEBHOOK_URL:-https://instead-greeting-oklahoma-booking.trycloudflare.com/api/whatsapp/webhook/}
      BACKEND_WEBHOOK_TOKEN: ${WHATSAPP_WEBHOOK_SECRET:-}
      FORWARD_INCOMING_TO_BACKEND: ${FORWARD_INCOMING_TO_BACKEND:-true}
    ports:
      - "3333:3333"
    volumes:
      - ./bot:/app
      - bot_node_modules:/app/node_modules
      - bot_auth:/app/auth_info
    networks:
      - app_net

volumes:
  bot_auth:
  bot_node_modules:
  frontend_node_modules:

networks:
  app_net:
    driver: bridge
